services:
  - type: web
    name: factureasy-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CHORUS_CLIENT_ID
        sync: false
      - key: CHORUS_CLIENT_SECRET
        sync: false
